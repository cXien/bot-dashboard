<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#03030a;
  --glass:rgba(255,255,255,0.04);
  --rim:rgba(255,255,255,0.07);
  --rim2:rgba(255,255,255,0.13);
  --text:rgba(255,255,255,0.92);
  --text2:rgba(255,255,255,0.45);
  --text3:rgba(255,255,255,0.22);
  --gold:#c9a84c;
  --discord:#5865f2;
  --rose:#f06292;
}
html,body{height:100%}
body{
  background:var(--void);
  color:var(--text);
  font-family:'Instrument Sans',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  /* Ambient orbs */
  background-image:
    radial-gradient(ellipse 800px 600px at 20% 20%,rgba(88,101,242,0.04) 0%,transparent 70%),
    radial-gradient(ellipse 600px 600px at 80% 80%,rgba(62,207,142,0.025) 0%,transparent 70%),
    radial-gradient(ellipse 500px 400px at 60% 30%,rgba(201,168,76,0.02) 0%,transparent 70%);
}

/* Fine grid */
.grid{
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 80%);
  -webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 80%);
}

/* Card */
.card{
  position:relative;z-index:1;
  background:var(--glass);
  backdrop-filter:blur(40px) saturate(160%);
  -webkit-backdrop-filter:blur(40px) saturate(160%);
  border:1px solid var(--rim);
  border-radius:18px;
  padding:52px 44px 44px;
  width:400px;
  text-align:center;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.03),
    0 50px 120px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.07);
  animation:up .5s cubic-bezier(.2,0,0,1) both;
}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* Logo */
.logo{
  width:66px;height:66px;
  background:linear-gradient(135deg,rgba(201,168,76,0.15),rgba(201,168,76,0.28));
  border:1px solid rgba(201,168,76,0.3);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 30px;
  font-size:30px;
  box-shadow:0 0 40px rgba(201,168,76,0.08),inset 0 1px 0 rgba(201,168,76,0.2);
}

h1{
  font-family:'Instrument Serif',serif;
  font-size:26px;
  font-style:italic;
  font-weight:400;
  margin-bottom:8px;
  color:var(--text);
  letter-spacing:-0.3px;
}

.sub{
  color:var(--text2);
  font-size:12px;
  margin-bottom:38px;
  line-height:1.8;
  letter-spacing:0.1px;
}

/* Discord button */
.btn{
  display:flex;align-items:center;justify-content:center;gap:11px;
  width:100%;
  padding:14px 24px;
  background:rgba(88,101,242,0.9);
  backdrop-filter:blur(10px);
  color:#fff;
  border:1px solid rgba(88,101,242,0.5);
  border-radius:10px;
  font-family:'Instrument Sans',sans-serif;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
  transition:all .2s cubic-bezier(.2,0,0,1);
  box-shadow:0 4px 20px rgba(88,101,242,0.2),inset 0 1px 0 rgba(255,255,255,0.12);
  letter-spacing:-0.1px;
}
.btn:hover{
  background:rgba(71,82,196,0.95);
  transform:translateY(-1px);
  box-shadow:0 8px 28px rgba(88,101,242,0.3),inset 0 1px 0 rgba(255,255,255,0.12);
}
.btn:active{transform:translateY(0);box-shadow:0 2px 10px rgba(88,101,242,0.2)}
.btn svg{width:19px;height:19px;flex-shrink:0}

/* Error */
.err{
  margin-top:14px;
  padding:11px 15px;
  background:rgba(240,98,146,0.07);
  border:1px solid rgba(240,98,146,0.18);
  border-radius:8px;
  color:rgba(240,98,146,0.8);
  font-size:12px;
  display:none;
}
.err.show{display:block;animation:up .25s ease}

/* Divider */
.div{height:1px;background:linear-gradient(90deg,transparent,var(--rim),transparent);margin:28px 0 20px}

/* Footer */
.foot{color:var(--text3);font-size:11px;letter-spacing:0.2px}
.foot em{font-style:normal;color:rgba(201,168,76,0.6);font-weight:500}

/* Corner version */
.ver{position:fixed;bottom:18px;right:20px;font-size:9px;color:rgba(255,255,255,0.08);letter-spacing:1px;text-transform:uppercase;font-family:'Instrument Sans',sans-serif}
</style>
</head>
