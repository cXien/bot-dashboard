<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bee Dashboard — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0a0f;
    --surface: #111118;
    --border:  rgba(255,255,255,0.07);
    --accent:  #5865f2;
    --accent2: #eb459e;
    --gold:    #fee75c;
    --text:    #e8e8f0;
    --muted:   #6b6b80;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Fondo animado */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(88,101,242,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(88,101,242,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .glow {
    position: fixed; z-index: 0; border-radius: 50%; filter: blur(120px); pointer-events: none;
  }
  .glow-1 { width: 600px; height: 600px; background: rgba(88,101,242,0.12); top: -200px; left: -200px; }
  .glow-2 { width: 400px; height: 400px; background: rgba(235,69,158,0.08); bottom: -100px; right: -100px; }

  /* Card */
  .card {
    position: relative; z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 56px 48px;
    width: 420px;
    text-align: center;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 28px;
    font-size: 32px;
    box-shadow: 0 8px 32px rgba(88,101,242,0.4);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--text), var(--muted));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 40px;
    line-height: 1.6;
  }

  .btn-discord {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%;
    padding: 16px 24px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(88,101,242,0.35);
  }
  .btn-discord:hover {
    background: #4752c4;
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(88,101,242,0.5);
  }
  .btn-discord:active { transform: translateY(0); }

  .btn-discord svg { width: 22px; height: 22px; }

  .error-msg {
    margin-top: 20px;
    padding: 12px 16px;
    background: rgba(237,66,69,0.1);
    border: 1px solid rgba(237,66,69,0.3);
    border-radius: 10px;
    color: #ed4245;
    font-size: 13px;
    display: none;
  }
  .error-msg.show { display: block; }

  .footer-note {
    margin-top: 28px;
    color: var(--muted);
    font-size: 12px;
  }
  .footer-note span { color: var(--accent); }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="card">
  <div class="logo">🐝</div>
  <h1>Bee Dashboard</h1>
  <p class="subtitle">Panel de administración del servidor.<br>Inicia sesión con tu cuenta de Discord.</p>

  <a href="/auth/discord" class="btn-discord">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.054a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
    Continuar con Discord
  </a>

  <div class="error-msg" id="errorMsg"></div>

  <p class="footer-note">Solo usuarios con rol <span>Admin</span> tienen acceso</p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const error  = params.get('error');
  const errors = {
    no_permission: 'No tienes permisos de administrador.',
    not_in_server: 'No estás en el servidor de Discord.',
    token_failed:  'Error al obtener el token. Intenta de nuevo.',
    server_error:  'Error del servidor. Intenta de nuevo.',
  };
  if (error && errors[error]) {
    const el = document.getElementById('errorMsg');
    el.textContent = errors[error];
    el.classList.add('show');
  }
</script>
</body>
</html>
